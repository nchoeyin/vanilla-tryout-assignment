<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> <!-- This loads all weights (100-900) with italics -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- header -->
  <header class="site-header">
    <div class="site-header__bar">
      <!-- Brand / Logo -->
      <a href="/" class="site-header__brand" aria-label="Mangalam Hope Pipes Home">
        <img
          src="assets/logo/navbar_app_logo.svg"
          alt="Mangalam Hope Pipes"
          class="site-header__logo"
        />
      </a>

      <!-- Desktop / Tablet nav -->
      <nav class="primary-nav" aria-label="Main navigation">
        <ul class="primary-nav__list">
          <li class="primary-nav__item">
            <a href="#about" class="primary-nav__link">About Us</a>
          </li>
          <li class="primary-nav__item primary-nav__item--has-dropdown">
            <button
              class="primary-nav__link primary-nav__link--button"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Products
              <span class="primary-nav__caret" aria-hidden="true">▾</span>
            </button>
            <!-- Optional dropdown menu -->
            <ul class="primary-nav__dropdown">
              <li><a href="#pipes" class="primary-nav__dropdown-link">Pipes</a></li>
              <li><a href="#coils" class="primary-nav__dropdown-link">Coils</a></li>
            </ul>
          </li>
        </ul>
      </nav>

      <!-- Primary CTA -->
      <a href="#contact" class="site-header__cta">Contact Us</a>

      <!-- Mobile menu toggle -->
      <button
        class="site-header__menu-toggle"
        type="button"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="mobile-nav"
      >
        <span class="site-header__menu-line"></span>
        <span class="site-header__menu-line"></span>
        <span class="site-header__menu-line"></span>
      </button>
    </div>

    <!-- Mobile nav drawer -->
    <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile navigation" hidden>
      <ul class="mobile-nav__list">
        <li class="mobile-nav__item">
          <a href="#about" class="mobile-nav__link">About Us</a>
        </li>
        <li class="mobile-nav__item">
          <button
            class="mobile-nav__link mobile-nav__link--button"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            Products
            <span class="mobile-nav__caret" aria-hidden="true">▾</span>
          </button>
          <ul class="mobile-nav__submenu">
            <li><a href="#pipes" class="mobile-nav__submenu-link">Pipes</a></li>
            <li><a href="#coils" class="mobile-nav__submenu-link">Coils</a></li>
          </ul>
        </li>
        <li class="mobile-nav__item mobile-nav__item--cta">
          <a href="#contact" class="mobile-nav__link mobile-nav__link--cta">
            Contact Us
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Page content -->
    <!-- hero-section -->
    <section class="hero-section">
      <div class="hero-container">
        <!-- Left content -->
        <div class="hero-content">
          <h1 class="hero-title">Premium HDPE Pipes & Coils for Modern Infrastructure</h1>
          <p class="hero-subtitle">Trusted for water supply, sewage, gas, and industrial applications</p>
          <div class="hero-features">
            <div class="feature-item">
              <div class="feature-icon">✓</div>
              <span>High durability</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon">✓</div>
              <span>Corrosion resistant</span>
            </div>
            <div class="feature-item">
              <div class="feature-icon">✓</div>
              <span>₹1,80,000+ saved</span>
            </div>
          </div>
          <button class="hero-cta">Get Quote Now</button>
        </div>
        <!-- Right image -->
        <div class="hero-image">
          <!-- Replace with your image: assets/hero-pipes.jpg -->
          <img src="assets/images/hero_section_fisherman_image.svg" alt="HDPE Pipes & Coils installation" loading="lazy">
        </div>
      </div>
    </section>

  </main>
  <script src="js/utils.js" defer></script>
  <script src="js/app.js" defer></script>  <!-- Loads last -->
</body>
</html>
